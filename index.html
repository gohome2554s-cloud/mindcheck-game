<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JIRAPAT V1.2 VIP</title>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; color: #fff; overflow: hidden; height: 100vh; }
        
        /* เป้าเล็งกลางจอ */
        #crosshair { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 9999; display: none; pointer-events: none; }

        /* หน้า LOGIN 10฿ */
        #login-gate { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { width: 85%; max-width: 320px; padding: 35px; border: 1px solid #ff0055; border-radius: 25px; text-align: center; background: #050505; }
        input { width: 100%; padding: 18px; margin: 20px 0; background: #000; border: 1px solid #222; color: #ff0055; text-align: center; font-size: 24px; border-radius: 15px; outline: none; font-weight: bold; }
        .btn-login { width: 100%; padding: 18px; background: #ff0055; color: #fff; font-weight: 900; border-radius: 12px; cursor: pointer; border:none; }
        .btn-random { background: transparent; color: #444; border: none; font-size: 11px; margin-top: 15px; cursor: pointer; text-decoration: underline; }

        /* หน้า PANEL V1.2 */
        #main-panel { display: none; padding: 20px; text-align: center; height: 100vh; overflow-y: auto; }
        .header { font-size: 28px; font-weight: 900; color: #ff0055; text-shadow: 0 0 15px #ff005566; }
        
        .card { background: #0a0a0a; border: 1px solid #111; border-radius: 18px; padding: 15px; margin-top: 15px; text-align: left; }
        .btn-mod { width: 100%; padding: 15px; background: #111; color: #fff; border: 1px solid #222; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 8px; }
        .btn-mod.active { border-color: #ff0055; color: #ff0055; }
        
        #btn-start { background: #ff0055; color: #fff; font-weight: 900; font-size: 22px; margin: 30px 0; display: none; border: none; }
    </style>
</head>
<body>

    <div id="crosshair"></div>

    <div id="login-gate">
        <div class="login-box">
            <h1 style="margin:0; font-size:24px; color:#ff0055;">JIRAPAT V1.2</h1>
            <p style="color:#333; font-size:10px;">PRIVATE PANEL | 10 BAHT ONLY</p>
            <input type="text" id="user-key" placeholder="KEY 5 DIGIT" maxlength="5">
            <button class="btn-login" onclick="checkKey()">LOGIN VIP</button>
            <br>
            <button class="btn-random" onclick="randomKey()">สุ่มแจกคีย์ฟรี (จำกัด 3 คน/วัน)</button>
        </div>
    </div>

    <div id="main-panel">
        <div class="header">JIRAPAT V1.2</div>
        <div style="font-size:10px; color:#ff0055; letter-spacing:2px;">STATUS: BYPASS ACTIVE</div>

        <div class="card">
            <span style="font-size:12px; color:#444;">เป้าเล็ง (CROSSHAIR)</span>
            <select id="cross-style" class="btn-mod" onchange="updateCross()">
                <option value="none">-- เลือกรูปแบบ --</option>
                <option value="dot">จุด (Dot)</option>
                <option value="circle">วงกลม (Circle)</option>
            </select>
        </div>

        <div class="card">
            <span style="font-size:12px; color:#444;">ระบบช่วยยิง (AIM ASSIST)</span>
            <button id="aim-btn" class="btn-mod" onclick="activateAim()">ล็อกหัว 60% (ฉีดไฟล์)</button>
            <button id="dpi-btn" class="btn-mod" onclick="activateDPI()">ปรับ DPI 1000 (เร่งความไว)</button>
        </div>

        <button id="btn-start" class="btn-mod" onclick="launchGame()">🚀 START GAME (NORMAL)</button>
        
        <p style="margin-top:40px; font-size:9px; color:#111;">BY JIRAPAT DEVELOPMENT</p>
    </div>

    <script>
        // คีย์เทพ (ต้องซื้อ)
        const vipKeys = ["JP101", "JP106", "JP103"];
        // คีย์กาก (เอาไว้สุ่มแจก)
        const junkKeys = ["XX001", "FREE9", "GUEST"];

        function checkKey() {
            const input = document.getElementById('user-key').value.trim().toUpperCase();
            if(vipKeys.includes(input)) {
                document.getElementById('login-gate').style.display = 'none';
                document.getElementById('main-panel').style.display = 'block';
                alert("ยินดีต้อนรับสมาชิก VIP JIRAPAT!");
            } else {
                alert("คีย์ไม่ถูกต้อง หรือจำนวนผู้ใช้เต็ม 3 คนแล้ว!");
            }
        }

        function randomKey() {
            const res = junkKeys[Math.floor(Math.random() * junkKeys.length)];
            alert("คีย์ฟรีของคุณคือ: " + res + " (คีย์นี้อาจจะเต็มแล้ว)");
        }

        function updateCross() {
            const s = document.getElementById('cross-style').value;
            const c = document.getElementById('crosshair');
            c.style.display = "block";
            c.style.backgroundColor = "#ff0055";
            if(s === 'dot') { c.style.width="4px"; c.style.height="4px"; c.style.borderRadius="50%"; }
            else if(s === 'circle') { c.style.width="10px"; c.style.height="10px"; c.style.borderRadius="50%"; c.style.background="transparent"; c.style.border="2px solid #ff0055"; }
        }

        let a=0, d=0;
        function activateAim() { document.getElementById('aim-btn').innerHTML="✅ ติดแล้ว"; document.getElementById('aim-btn').classList.add('active'); a=1; check(); }
        function activateDPI() { document.getElementById('dpi-btn').innerHTML="✅ ติดแล้ว"; document.getElementById('dpi-btn').classList.add('active'); d=1; check(); }
        function check() { if(a && d) document.getElementById('btn-start').style.display="block"; }

        function launchGame() {
            // ดีดเข้าแอปฟีฟายตัวจริงทันที
            window.location.href = "intent://#Intent;scheme=android-app;package=com.dts.freefireth;end";
        }
    </script>
</body>
</html>
